description: Mouse Gesture Input Processor

compatible: "zmk,input-processor-mouse-gesture"

properties:
  "#input-processor-cells":
    type: int
    const: 0
    description: "Number of cells in input processor specifier"

  instance-id:
    type: int
    default: 0
    description: |
      Unique ID for this gesture processor instance.
      Must match the first parameter of &mouse_gesture_kp used to activate it.
      E.g. instance-id = <0> is activated by &mouse_gesture_kp 0 KEY,
           instance-id = <1> is activated by &mouse_gesture_kp 1 KEY.

  track-remainders:
    type: boolean
    description: "Whether to track remainders"

  stroke-size:
    type: int
    default: 200
    description: "Size of one stroke in a gesture."

  movement-threshold:
    type: int
    default: 10
    description: "Threshold for each x/y event"

  enable-eager-mode:
    type: boolean
    description: "Execute pattern matching in real-time and invoke bindings immediately when gesture pattern is matched."

  idle-timeout-ms:
    type: int
    default: 150
    description: "Time in milliseconds to wait for idle before invoking gesture. When set to 0, idle timeout is disabled."

  gesture-cooldown-ms:
    type: int
    default: 500
    description: "Time in milliseconds to stop processing for next gesture after the execution of a gesture."

child-binding:
  description: "Mouse gesture definition"
  properties:
    pattern:
      type: array
      required: true
      description: "Array of gesture directions that make up this gesture sequence"

    bindings:
      type: phandle-array
      required: true
      description: "Behaviors to be invoked when this gesture is detected"

    wait-ms:
      type: int
      description: "Time in milliseconds to wait between consecutive behavior invocations"

    tap-ms:
      type: int
      description: "Time in milliseconds between press and release events for each behavior"
